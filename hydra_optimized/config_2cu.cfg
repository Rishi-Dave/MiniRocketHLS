# HYDRA 2-CU Hardware Connectivity Configuration
# Maps kernel ports to HBM banks on Alveo U280

[connectivity]
# Two compute unit instances
nk=hydra_inference:2

# CU1 → HBM[0-8]
sp=hydra_inference_1.time_series_input:HBM[0]
sp=hydra_inference_1.prediction_output:HBM[1]
sp=hydra_inference_1.coefficients:HBM[2]
sp=hydra_inference_1.intercept:HBM[3]
sp=hydra_inference_1.scaler_mean:HBM[4]
sp=hydra_inference_1.scaler_scale:HBM[5]
sp=hydra_inference_1.kernel_weights:HBM[6]
sp=hydra_inference_1.biases:HBM[7]
sp=hydra_inference_1.dilations:HBM[8]

# CU2 → HBM[9-17]
sp=hydra_inference_2.time_series_input:HBM[9]
sp=hydra_inference_2.prediction_output:HBM[10]
sp=hydra_inference_2.coefficients:HBM[11]
sp=hydra_inference_2.intercept:HBM[12]
sp=hydra_inference_2.scaler_mean:HBM[13]
sp=hydra_inference_2.scaler_scale:HBM[14]
sp=hydra_inference_2.kernel_weights:HBM[15]
sp=hydra_inference_2.biases:HBM[16]
sp=hydra_inference_2.dilations:HBM[17]

# SLR placement — both CUs in SLR0 to minimize HBM crossing penalty
# (HYDRA CU is small: ~35K LUT, two fit comfortably in SLR0)
slr=hydra_inference_1:SLR0
slr=hydra_inference_2:SLR0
