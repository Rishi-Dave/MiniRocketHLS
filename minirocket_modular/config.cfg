[connectivity]
# MiniRocket Modular - Three-kernel pipeline connected via AXI-Stream
# K1: Feature Extraction (conv + PPV)
# K2: Scaler (z-normalization with precomputed inv_scale)
# K3: Classifier (ridge regression)
#
# Total HBM ports: 9 (4 + 2 + 3), fits within U280's 32-port limit

# Kernel instances
nk=feature_extraction:1
nk=scaler:1
nk=classifier:1

# AXI-Stream connections (kernel-to-kernel, no HBM intermediate)
sc=feature_extraction_1.features_out:scaler_1.features_in:1024
sc=scaler_1.scaled_features_out:classifier_1.scaled_features_in:1024

# K1: Feature Extraction - HBM port assignments
sp=feature_extraction_1.time_series_input:HBM[0]
sp=feature_extraction_1.dilations:HBM[1]
sp=feature_extraction_1.num_features_per_dilation:HBM[2]
sp=feature_extraction_1.biases:HBM[3]

# K2: Scaler - HBM port assignments
sp=scaler_1.scaler_mean:HBM[4]
sp=scaler_1.inv_scale:HBM[5]

# K3: Classifier - HBM port assignments
sp=classifier_1.coefficients:HBM[6]
sp=classifier_1.intercept:HBM[7]
sp=classifier_1.prediction_output:HBM[8]
