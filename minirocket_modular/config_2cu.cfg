[connectivity]
# MiniRocket Modular - 2-CU pipeline for doubled throughput
# Each CU is a complete K1->K2->K3 pipeline connected via AXI-Stream
# Total HBM ports: 18 (9 per pipeline), fits within U280's 32-port limit

# Kernel instances (2 of each)
nk=feature_extraction:2
nk=scaler:2
nk=classifier:2

# Pipeline 1: AXI-Stream connections
sc=feature_extraction_1.features_out:scaler_1.features_in:1024
sc=scaler_1.scaled_features_out:classifier_1.scaled_features_in:1024

# Pipeline 2: AXI-Stream connections
sc=feature_extraction_2.features_out:scaler_2.features_in:1024
sc=scaler_2.scaled_features_out:classifier_2.scaled_features_in:1024

# Pipeline 1: HBM[0-8]
sp=feature_extraction_1.time_series_input:HBM[0]
sp=feature_extraction_1.dilations:HBM[1]
sp=feature_extraction_1.num_features_per_dilation:HBM[2]
sp=feature_extraction_1.biases:HBM[3]
sp=scaler_1.scaler_mean:HBM[4]
sp=scaler_1.inv_scale:HBM[5]
sp=classifier_1.coefficients:HBM[6]
sp=classifier_1.intercept:HBM[7]
sp=classifier_1.prediction_output:HBM[8]

# Pipeline 2: HBM[9-17]
sp=feature_extraction_2.time_series_input:HBM[9]
sp=feature_extraction_2.dilations:HBM[10]
sp=feature_extraction_2.num_features_per_dilation:HBM[11]
sp=feature_extraction_2.biases:HBM[12]
sp=scaler_2.scaler_mean:HBM[13]
sp=scaler_2.inv_scale:HBM[14]
sp=classifier_2.coefficients:HBM[15]
sp=classifier_2.intercept:HBM[16]
sp=classifier_2.prediction_output:HBM[17]

# SLR placement: distribute K1 instances across SLRs
# K1 is the heaviest kernel (55% SLR0 BRAM, 26% DSP)
# Spreading across SLRs avoids congestion
slr=feature_extraction_1:SLR0
slr=feature_extraction_2:SLR1
